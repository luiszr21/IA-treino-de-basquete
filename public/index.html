<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwishLab IA</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="image/favicon.png" type="image/x-icon">
  
</head>
<body>
  <div class="chat-container">

    <header class="chat-header">
      <h1>Swish<span>Lab</span></h1>
      <p class="subtitulo">como posso ajudar a melhorar o seu jogo?</p>
    </header>

    <main class="chat-mensagens" id="chat-mensagens">
      <div class="balao balao-assistente">
        <div class="balao-texto">
          Olá! Sou o SwishLab Coach. Me diga sua posição e o que quer treinar, e vou montar uma rotina personalizada pra você.
        </div>
        <span class="balao-hora" id="hora-inicial"></span>
      </div>
    </main>

    <footer class="chat-input-area">
      <div class="chat-input-wrap">
        <textarea
          id="chat-input"
          class="chat-input"
          placeholder="Pergunte sobre treinos, posições ou fundamentos..."
          rows="1"
        ></textarea>
        <button id="btn-enviar" class="btn-enviar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </footer>

  </div>
  <script src="main.js"></script>
</body>
</html>
